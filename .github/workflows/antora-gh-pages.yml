name: Publish to GitHub Pages with Lunr Search Extension
on:
  push:
    branches:
      - main
      - 'v[0-9]*.[0-9]*.[0-9]*'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: 'Build Doc Site'
    services:
      kroki:
        image: yuzutech/kroki
        ports:
          - 8081:8000
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (hash-pinned for security)
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5 (hash-pinned for security)

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (hash-pinned for security)
        with:
          node-version: '18'

      - name: Install Antora + Antora Lunr Extension + Kroki
        run: npm i antora @antora/lunr-extension asciidoctor-kroki

      - name: Wait for Kroki server to start # Optional but recommended
        run: |
          max_attempts=10
          attempt=0
          while [[ $attempt -lt $max_attempts ]]; do
            curl -s http://localhost:8081/health | grep -q 'pass' && break || attempt=$((attempt+1)) && sleep 1
          done

      - name: Fetch all branches
        run: |
          git fetch --all
          for branch in $(git branch -r | grep -v '\->' | grep -v 'HEAD'); do
            git branch --track "${branch#origin/}" "$branch" 2>/dev/null || true
          done

      - name: Generate Site
        env:
          KROKI_URL: http://localhost:8081
        run: |
          chmod +x gen-site.sh
          ./gen-site.sh

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3 (hash-pinned for security)
        with:
          path: site

  deploy:
    name: 'Deploy to GitHub Pages'
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4 (hash-pinned for security)
